; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
src_dir = .

[custom]
mega_entry = src_mega/new_drive_and_control_test.cpp ;change this to switch what to upload

[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_src_filter = -<*> +<src_uno/manager_main.cpp>
monitor_speed = 9600
lib_deps = 
	arduino-libraries/Servo@^1.3.0
	pololu/DualVNH5019MotorShield@^3.0.0

[env:mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
build_src_filter = -<*> +<${custom.mega_entry}>
monitor_speed = 115200
lib_deps = 
	arduino-libraries/Servo@^1.3.0
	pololu/DualVNH5019MotorShield@^3.0.0

[env:mega_node]
platform = atmelavr
board = megaatmega2560
framework = arduino
build_src_filter = -<*> +<src_mega/node_main.cpp>
